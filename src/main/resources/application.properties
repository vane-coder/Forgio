# ============================================================
# Forgio Backend – Application Configuration
# ============================================================

server.port=8080

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/forgio_db
spring.datasource.username=${DB_USERNAME:forgio}
spring.datasource.password=${DB_PASSWORD:forgio_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ──────────────────────────────────────────────────────
forgio.jwt.secret=${JWT_SECRET:forgio-secret-key-must-be-at-least-256-bits-long-for-hs256}
forgio.jwt.access-token-expiration=86400000
forgio.jwt.refresh-token-expiration=604800000

# ── Firebase FCM ─────────────────────────────────────────────
forgio.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# ── Claude AI (Anthropic) ────────────────────────────────────
forgio.claude.api-key=${CLAUDE_API_KEY}
forgio.claude.model=claude-sonnet-4-6
forgio.claude.base-url=https://api.anthropic.com/v1/messages
forgio.claude.max-tokens=1024

# ── OpenWeatherMap ───────────────────────────────────────────
forgio.weather.api-key=${OPENWEATHER_API_KEY}
forgio.weather.base-url=https://api.openweathermap.org/data/2.5

# ── Google Maps (GPS Tracking) ───────────────────────────────
forgio.maps.api-key=${GOOGLE_MAPS_API_KEY}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.forgio=DEBUG
logging.level.org.springframework.security=WARN

# Claude AI (optional — fallback used if key is blank)
forgio.claude.api-key=${CLAUDE_API_KEY:}
forgio.claude.model=claude-sonnet-4-6