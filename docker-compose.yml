services:
  db:
    image: postgres:16
    container_name: forgio_db
    restart: always
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: forgio_db
    ports:
      - "5432:5432"
    volumes:
      - ./Forgio/src/main/resources/db/migration:/docker-entrypoint-initdb.d